<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jeu : Le Pendu du Fournil</title>
<style>
  :root {
    --primary: #D35400; /* Orange cuisson */
    --secondary: #2C3E50; /* Bleu ardoise */
    --accent: #F1C40F; /* Jaune doré */
    --dark: #1A252F;
    --light: #FDFEFE;
    --success: #27AE60;
    --danger: #C0392B;
    --bg-color: #F4F6F6;
  }
  body {
    font-family: 'Franklin Gothic Medium', 'Franklin Gothic', 'ITC Franklin Gothic', Arial, sans-serif;
    font-size: 1.15rem; 
    background-color: var(--light);
    color: var(--dark);
    line-height: 1.6;
    padding: 20px;
    max-width: 900px;
    margin: 0 auto;
    text-align: center;
  }
  .nav-header {
    display: flex;
    justify-content: flex-start;
    margin-bottom: 20px;
  }
  .back-btn {
    display: inline-block;
    background-color: var(--dark);
    color: var(--light);
    text-decoration: none;
    padding: 10px 20px;
    border-radius: 8px;
    font-weight: bold;
    font-size: 0.9em;
    transition: background-color 0.3s, transform 0.1s;
  }
  .back-btn:hover {
    background-color: var(--primary);
  }
  .back-btn:active {
    transform: scale(0.98);
  }
  h1 {
    color: var(--primary);
    border-bottom: 4px dashed var(--accent);
    padding-bottom: 15px;
    font-size: 2.2em;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }
  .author-tag {
    font-size: 0.45em;
    color: #fff;
    background-color: var(--secondary);
    padding: 5px 15px;
    border-radius: 20px;
    font-weight: normal;
    font-family: 'Segoe UI', sans-serif;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .game-container {
    background-color: var(--bg-color);
    border: 4px solid var(--secondary);
    border-radius: 15px;
    padding: 25px;
    box-shadow: 0 8px 15px rgba(0,0,0,0.1);
    margin-top: 20px;
  }
  .word-display {
    font-size: 2.5em;
    letter-spacing: 10px;
    margin: 30px 0;
    font-family: monospace;
    font-weight: bold;
    color: var(--secondary);
    min-height: 60px;
  }
  .keyboard {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 10px;
    max-width: 600px;
    margin: 0 auto 30px auto;
  }
  .key {
    background-color: #ECF0F1;
    border: 2px solid #BDC3C7;
    color: var(--dark);
    font-size: 1.2em;
    font-weight: bold;
    padding: 10px 15px;
    border-radius: 8px;
    cursor: pointer;
    transition: 0.2s;
    font-family: inherit;
    min-width: 45px;
  }
  .key:hover:not(:disabled) {
    background-color: var(--accent);
    border-color: var(--primary);
  }
  .key:active:not(:disabled) {
    transform: scale(0.95);
  }
  .key:disabled {
    cursor: not-allowed;
    opacity: 0.5;
  }
  .key.correct {
    background-color: var(--success);
    color: white;
    border-color: var(--success);
  }
  .key.wrong {
    background-color: var(--danger);
    color: white;
    border-color: var(--danger);
  }
  .message {
    font-size: 1.5em;
    font-weight: bold;
    margin: 20px 0;
    min-height: 40px;
  }
  .btn-restart {
    background-color: var(--primary);
    color: white;
    border: none;
    padding: 12px 25px;
    font-size: 1.1em;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
    transition: 0.3s;
    font-family: inherit;
    display: none;
  }
  .btn-restart:hover {
    background-color: #E67E22;
  }
  .illustration-container {
    margin: 20px auto;
    width: 100%;
    max-width: 400px;
    background: #FFF;
    border-radius: 10px;
    padding: 15px;
    border: 2px dashed #BDC3C7;
  }
</style>
</head>
<body>

  <div class="nav-header">
    <a href="sommaire.html" class="back-btn">⬅ Retour au sommaire</a>
  </div>

  <h1>
    Le Pendu du Fournil : Alerte Cuisson !
    <span class="author-tag">proposé par Emmanuel Boutée</span>
  </h1>

  <p>Retrouve le mot mystère caché derrière les tirets. Attention, à chaque erreur, ton four chauffe un peu plus. Si tu te trompes 7 fois, la fournée est carbonisée !</p>

  <div class="game-container">
    
    <div class="illustration-container">
      <svg id="hangman-svg" viewBox="0 0 300 250" width="100%" height="auto">
        <rect x="20" y="20" width="260" height="210" fill="#FEF9E7" rx="10"/>
        
        <line id="step1" x1="40" y1="200" x2="260" y2="200" stroke="#7F8C8D" stroke-width="8" stroke-linecap="round" opacity="0"/>
        
        <path id="step2" d="M 50 200 C 50 50, 250 50, 250 200" fill="none" stroke="#95A5A6" stroke-width="12" opacity="0"/>
        
        <rect id="step3" x="70" y="190" width="160" height="10" fill="#E67E22" opacity="0"/>
        
        <line id="step4" x1="280" y1="160" x2="180" y2="180" stroke="#D35400" stroke-width="6" opacity="0"/>
        <polygon id="step4-2" points="180,180 130,180 140,170 185,170" fill="#E67E22" opacity="0"/>
        
        <path id="step5" d="M 100 185 Q 125 175 150 185" fill="none" stroke="#F1C40F" stroke-width="12" stroke-linecap="round" opacity="0"/>
        
        <path id="step6" d="M 120 160 Q 110 130 130 100 T 120 60" fill="none" stroke="#BDC3C7" stroke-width="6" stroke-linecap="round" opacity="0"/>
        <path id="step6-2" d="M 140 160 Q 150 120 130 90 T 150 50" fill="none" stroke="#BDC3C7" stroke-width="6" stroke-linecap="round" opacity="0"/>
        
        <path id="step7-fire1" d="M 90 190 Q 100 140 110 190 Z" fill="#E74C3C" opacity="0"/>
        <path id="step7-fire2" d="M 130 190 Q 140 120 150 190 Z" fill="#C0392B" opacity="0"/>
        <path id="step7-fire3" d="M 160 190 Q 170 150 180 190 Z" fill="#E74C3C" opacity="0"/>
        <path id="step7-burnt" d="M 100 185 Q 125 175 150 185" fill="none" stroke="#2C3E50" stroke-width="12" stroke-linecap="round" opacity="0"/>
      </svg>
    </div>

    <div id="word-display" class="word-display"></div>

    <div id="message" class="message"></div>

    <div id="keyboard" class="keyboard"></div>

    <button id="btn-restart" class="btn-restart" onclick="initGame()">Préparer une nouvelle fournée</button>

  </div>

  <script>
    // Base de données de 60 mots (sans accents pour le jeu)
    const motsDatabase = [
      "BILAN", "ACTIF", "PASSIF", "RENTABILITE", "TRESORERIE", 
      "FARINE", "PETRIN", "CHARTRES", "BEAUCE", "SEUIL", 
      "CHARGE", "PRODUIT", "AMORTISSEMENT", "EMPRUNT", "BFR", 
      "FRNG", "STOCK", "DECAISSEMENT", "ENCAISSEMENT", "TVA", 
      "MARGE", "RESULTAT", "CAPITAUX", "DETTES", "EXPLOITATION", 
      "DOTATION", "VALEUR", "AJOUTEE", "EBE", "CAF", 
      "INVESTISSEMENT", "ANNUITE", "LINEAIRE", "DEGRESSIF", "COMMANDE", 
      "LIVRAISON", "INVENTAIRE", "FOURNIL", "MEUNIER", "ARTISAN", 
      "COMMERCE", "RUPTURE", "DECOUVERT", "BANQUE", "INTERETS", 
      "SOLDE", "BUDGET", "PREVISION", "TENDANCE", "MAYER", 
      "MOINDRES", "CARRES", "CORRELATION", "EXCEPTIONNEL", "FINANCIER", 
      "RATIO", "INDEPENDANCE", "RENTABLE", "DEFICIT", "BENEFICE"
    ];

    let motAClair = "";
    let lettresTrouvees = [];
    let erreurs = 0;
    const maxErreurs = 7;

    // Initialisation du clavier
    function genererClavier() {
      const keyboardDiv = document.getElementById('keyboard');
      keyboardDiv.innerHTML = '';
      const alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split('');
      
      alphabet.forEach(lettre => {
        const btn = document.createElement('button');
        btn.innerText = lettre;
        btn.className = 'key';
        btn.id = `key-${lettre}`;
        btn.onclick = () => testerLettre(lettre);
        keyboardDiv.appendChild(btn);
      });
    }

    // Démarrage ou redémarrage d'une partie
    function initGame() {
      // Choix d'un mot au hasard
      motAClair = motsDatabase[Math.floor(Math.random() * motsDatabase.length)];
      lettresTrouvees = [];
      erreurs = 0;

      // Réinitialisation de l'affichage
      document.getElementById('message').innerText = "";
      document.getElementById('message').style.color = "var(--dark)";
      document.getElementById('btn-restart').style.display = "none";
      genererClavier();
      majAffichageMot();
      resetSVG();

      // Activation de la saisie au clavier physique
      document.addEventListener('keydown', handleKeyPress);
    }

    // Mise à jour du mot masqué
    function majAffichageMot() {
      let affichage = "";
      let gagne = true;

      for (let i = 0; i < motAClair.length; i++) {
        if (lettresTrouvees.includes(motAClair[i])) {
          affichage += motAClair[i];
        } else {
          affichage += "_";
          gagne = false;
        }
      }

      document.getElementById('word-display').innerText = affichage;

      if (gagne) {
        finDePartie(true);
      }
    }

    // Test d'une lettre cliquée ou tapée
    function testerLettre(lettre) {
      const btn = document.getElementById(`key-${lettre}`);
      if (!btn || btn.disabled) return;

      btn.disabled = true;

      if (motAClair.includes(lettre)) {
        btn.classList.add('correct');
        lettresTrouvees.push(lettre);
        majAffichageMot();
      } else {
        btn.classList.add('wrong');
        erreurs++;
        majSVG(erreurs);
        if (erreurs >= maxErreurs) {
          finDePartie(false);
        }
      }
    }

    // Gestion du clavier physique
    function handleKeyPress(event) {
      const lettre = event.key.toUpperCase();
      if (/^[A-Z]$/.test(lettre)) {
        testerLettre(lettre);
      }
    }

    // Affichage des éléments du four SVG selon le nombre d'erreurs
    function majSVG(etape) {
      if (etape === 1) document.getElementById('step1').style.opacity = "1";
      if (etape === 2) document.getElementById('step2').style.opacity = "1";
      if (etape === 3) document.getElementById('step3').style.opacity = "1";
      if (etape === 4) {
        document.getElementById('step4').style.opacity = "1";
        document.getElementById('step4-2').style.opacity = "1";
      }
      if (etape === 5) document.getElementById('step5').style.opacity = "1";
      if (etape === 6) {
        document.getElementById('step6').style.opacity = "1";
        document.getElementById('step6-2').style.opacity = "1";
      }
      if (etape === 7) {
        document.getElementById('step5').style.opacity = "0"; // Cache le pâton cru
        document.getElementById('step7-fire1').style.opacity = "1";
        document.getElementById('step7-fire2').style.opacity = "1";
        document.getElementById('step7-fire3').style.opacity = "1";
        document.getElementById('step7-burnt').style.opacity = "1"; // Baguette brûlée
      }
    }

    // Réinitialisation du SVG
    function resetSVG() {
      const elementsToHide = [
        'step1', 'step2', 'step3', 'step4', 'step4-2', 
        'step5', 'step6', 'step6-2', 
        'step7-fire1', 'step7-fire2', 'step7-fire3', 'step7-burnt'
      ];
      elementsToHide.forEach(id => {
        document.getElementById(id).style.opacity = "0";
      });
    }

    // Gestion de la victoire ou défaite
    function finDePartie(victoire) {
      document.removeEventListener('keydown', handleKeyPress);
      const msgDiv = document.getElementById('message');
      
      // Désactiver tout le clavier
      const allKeys = document.querySelectorAll('.key');
      allKeys.forEach(k => k.disabled = true);

      if (victoire) {
        msgDiv.innerText = "🏆 Félicitations ! Cuisson parfaite !";
        msgDiv.style.color = "var(--success)";
      } else {
        msgDiv.innerText = `🔥 Catastrophe ! Le mot était : ${motAClair}`;
        msgDiv.style.color = "var(--danger)";
        document.getElementById('word-display').innerText = motAClair;
      }

      document.getElementById('btn-restart').style.display = "inline-block";
    }

    // Lancer le jeu au chargement de la page
    window.onload = initGame;
  </script>

</body>
</html>
